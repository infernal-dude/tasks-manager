services:
# Если используешь докер, то нужно чтобы твой код тоже запускался в докере, отдельным контейнером.
# Тогда мне достаточно было бы написать docker-compose up чтобы проверить работоспособность твоего проекта
  postgres:
    image: postgres:15
    container_name: tasks_manager_postgres
    restart: always
    env_file:
      - .env
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: